name: TasteWorld
options:
  bundleIdPrefix: com.tasteworld
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  groupSortPosition: top
  generateEmptyDirectories: true
  indentWidth: 4
  tabWidth: 4

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.tasteworld.app
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: TasteWorld/Info.plist
    ENABLE_PREVIEWS: YES

targets:
  TasteWorld:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TasteWorld
        excludes:
          - "Info.plist"
    settings:
      base:
        INFOPLIST_FILE: TasteWorld/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tasteworld.app
    info:
      path: TasteWorld/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleDisplayName: "Taste World"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
